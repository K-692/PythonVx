name: Release Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 🔧
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: './python-visualizer/package-lock.json'

      - name: Install Rust 🦀
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only) 📦
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Frontend Dependencies 🏗️
        run: |
          cd python-visualizer
          npm install

      - name: Build and Release 🚀
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PythonVx ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the latest version of PythonVx.'
          releaseDraft: true
          prerelease: false
          projectPath: './python-visualizer'
